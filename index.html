<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunter Trading Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #070b11; color: #e8ecf1; }

        .header-sticky {
            position: sticky; top: 0; z-index: 100;
            background-color: rgba(7, 11, 17, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .live-dot {
            display: inline-block; width: 8px; height: 8px;
            background-color: #4ade80; border-radius: 50%;
            animation: pulse 2s infinite; margin-right: 6px;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        .card {
            background-color: rgba(30,41,59,0.8);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 12px; padding: 16px;
            transition: all 0.3s ease;
        }
        .card:hover { border-color: rgba(148,163,184,0.4); }

        .signal-banner {
            background: linear-gradient(135deg, rgba(30,41,59,0.9) 0%, rgba(15,23,42,0.9) 100%);
            border: 2px solid rgba(148,163,184,0.3);
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
        }
        .signal-banner.bullish { border-color: rgba(74,222,128,0.5); background: linear-gradient(135deg, rgba(20,40,20,0.9) 0%, rgba(15,28,15,0.9) 100%); }
        .signal-banner.bearish { border-color: rgba(248,113,113,0.5); background: linear-gradient(135deg, rgba(40,20,20,0.9) 0%, rgba(28,15,15,0.9) 100%); }
        .signal-banner.conflict { border-color: rgba(251,191,36,0.5); background: linear-gradient(135deg, rgba(40,35,15,0.9) 0%, rgba(28,25,10,0.9) 100%); }

        .badge {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            font-weight: 600; font-size: 13px;
        }
        .badge-long { background-color: rgba(74,222,128,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.5); }
        .badge-short { background-color: rgba(248,113,113,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.5); }
        .badge-conflict { background-color: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.5); }
        .badge-wait { background-color: rgba(156,163,175,0.2); color: #9ca3af; border: 1px solid rgba(156,163,175,0.5); }

        .signal-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-top: 12px;
        }
        .signal-item {
            background-color: rgba(15,23,42,0.6);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 8px; padding: 10px; text-align: center;
        }
        .signal-item-label { font-size: 11px; color: rgba(226,232,240,0.6); margin-bottom: 4px; }
        .signal-item-value { font-size: 16px; font-weight: 700; }

        .metric-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .metric-box {
            background-color: rgba(30,41,59,0.6);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 8px; padding: 10px; text-align: center;
        }
        .metric-label { font-size: 10px; color: rgba(226,232,240,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .metric-value { font-size: 15px; font-weight: 700; }

        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .stat-card {
            background-color: rgba(15,23,42,0.6);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 8px; padding: 12px; text-align: center;
        }
        .stat-label { font-size: 10px; color: rgba(226,232,240,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 17px; font-weight: 700; }

        .history-table {
            width: 100%; border-collapse: collapse;
            background-color: rgba(30,41,59,0.6);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 8px; overflow: hidden;
        }
        .history-table thead { background-color: rgba(15,23,42,0.8); border-bottom: 1px solid rgba(148,163,184,0.3); }
        .history-table th { padding: 10px; text-align: left; font-size: 11px; font-weight: 600; color: rgba(226,232,240,0.6); text-transform: uppercase; letter-spacing: 0.5px; }
        .history-table td { padding: 10px; border-bottom: 1px solid rgba(148,163,184,0.1); font-size: 12px; }
        .history-table tbody tr { transition: background-color 0.2s; }
        .history-table tbody tr:hover { background-color: rgba(148,163,184,0.1); }
        .trade-row { border-left: 3px solid; }
        .trade-row.win { border-left-color: #4ade80; }
        .trade-row.loss { border-left-color: #f87171; }

        .score-bar { height: 6px; border-radius: 3px; background: rgba(148,163,184,0.2); overflow: hidden; margin-top: 4px; }
        .score-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        .section-title { font-size: 15px; font-weight: 700; color: #e8ecf1; margin-bottom: 14px; }
        .text-green { color: #4ade80; }
        .text-red { color: #f87171; }
        .text-yellow { color: #fbbf24; }
        .text-gray { color: rgba(226,232,240,0.6); }
        .text-xs { font-size: 11px; }
        .text-sm { font-size: 12px; }

        .dimension-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 6px; margin-top: 10px;
        }
        .dim-item {
            background: rgba(15,23,42,0.4); border-radius: 6px;
            padding: 6px 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .dim-name { font-size: 10px; color: rgba(226,232,240,0.5); }
        .dim-score { font-size: 13px; font-weight: 700; }

        .update-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
            border-radius: 12px; padding: 2px 10px; font-size: 10px; color: #4ade80;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .signal-grid { grid-template-columns: repeat(3, 1fr); }
            .dimension-grid { grid-template-columns: repeat(2, 1fr); }
            .metric-row { grid-template-columns: repeat(3, 1fr); }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            body { font-size: 13px; }
            .signal-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .dimension-grid { grid-template-columns: 1fr 1fr; }
            .metric-row { grid-template-columns: repeat(2, 1fr); }
            .signal-banner { padding: 14px; }
            .history-table .hide-mobile { display: none; }
        }
    </style>
</head>
